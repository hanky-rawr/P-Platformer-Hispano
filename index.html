<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Plataformero Hispano - Demon List</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><img src="data/imgs/logo.png" alt="Platformer Hispano" class="nav-logo"></div>
        <button class="nav-hamburger" id="nav-hamburger" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="nav-links-menu">
            <button class="nav-btn active" id="nav-lista">Lista</button>
            <button class="nav-btn" id="nav-leaderboard">Leaderboard</button>
            <button class="nav-btn" id="nav-info">Info</button>
            <a href="https://discord.gg/SwGG7n4duy" target="_blank" class="nav-link sub-record">Discord</a>
            <a href="https://forms.gle/4gPTiRLUFHLv1xXQ9" target="_blank" class="nav-link sub-record">Subir Record</a>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Buscar nivel o creador...">
            <select id="country-filter" class="country-dropdown">
                <option value="">Todos los países</option>
            </select>
        </div>
    </nav>

    <main class="main-layout" id="main-content">
        <aside class="sidebar-list">
            <div class="list-title">Niveles Oficiales</div>
            <div class="levels-container" id="levels-list"></div>
        </aside>
        <section class="detail-container" id="level-detail-panel"></section>
    </main>

    <div class="modal-overlay" id="country-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close-btn">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
